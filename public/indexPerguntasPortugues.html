<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
  <title>Quiz - Português</title>
  <link rel="stylesheet" href="stylePerguntasGeral.css">
</head>

<body>

  <div class="quiz-box">

    <div class="topo">
      <div class="lvl" id="tituloNivel">LVL 1 Gramática</div>

      <div class="barra-area">
        <div class="barra">
          <div class="progresso" id="barra"></div>
        </div>

        <div class="contador" id="contador">1/10</div>
      </div>
    </div>

    <div id="conteudoQuiz">

      <div class="area-img">
        <img id="imagemQuestao" src="imagem da questão" alt="">
      </div>

      <div class="pergunta" id="pergunta"></div>

      <div class="respostas" id="respostas"></div>

    </div>

  </div>

<script src="scriptPerguntasPortugues.js"></script>
</body>
</html>
