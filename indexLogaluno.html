<!doctype html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="shortcut icon" href="favicon.ico" type="image/x-icon" />
  <title>Login - Aluno</title>
  <link rel="stylesheet" href="styleLogAluno.css" />
</head>

<body>
  <header>
    <a href="index.html"><img class="logo" src="study4life_glitch_rgb.gif" alt="" srcset=""></a>
  </header>

  <!-- começo do circulo -->
  <div class="container2">
    <div class="opcao-aluno">
      <span class="circulo">🧑‍💻</span>
      <p>Aluno</p>
    </div>
  </div>
  <!-- final do circulo -->

  <!-- container do card -->
  <div class="container">
    <div class="card">

      <p class="subtitulo">Para acessar a conta preencha seus dados</p>
      <h1>Bem vindo de volta!</h1>

      <input type="email" placeholder="Email address" />
      <input type="password" placeholder="Password" />
      <div class="opcoes">
        <label class="checkbox-area">
          <input type="checkbox" />
          <span class="span">
            Eu li e concordo com os
            <a href="#">termos de uso e politica de privacidade.</a>
          </span>
        </label>
        <a href="forgotpass.html" class="forgot">Esqueceu a senha?</a>
      </div>
      <a href="indexHome.html"> <button class="btn">Entrar</button></a>
      <button class="google-btn">
        <img src="https://cdn-icons-png.flaticon.com/512/2991/2991148.png" />
        Entrar com o Google
      </button>
      <p class="cad-btn">
        Não tem uma conta? <a href="cadastro-aluno.html">Cadastre-se</a>
      </p>
    </div>
  </div>

</body>
<script src="scriptLogAluno.js"></script>

</html>
