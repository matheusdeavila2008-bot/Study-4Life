<!doctype html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="shortcut icon" href="favicon.ico" type="image/x-icon" />
  <title>Cadastro - Aluno</title>
  <link rel="stylesheet" href="stylecadastroaluno.css" />
</head>

<body>
  <header>
    <a href="indexLogaluno.html"><img class="logo" src="study4life_glitch_rgb.gif" alt="" srcset=""></a>
  </header>

  <div class="container2">
    <div class="opcao-aluno">
      <span class="circulo">🧑‍💻</span>
      <p>Aluno</p>
    </div>
  </div>

  <div class="container">
    <div class="card">
      <p class="subtitulo">Cadastre-se para acessar o Study<span class="color-verde">4Life</span>!</p>
      <h1>Cadastre-se</h1>

      <section>
        <label>Nome<span class="color-vermelho">*</span></label>
        <input type="text" placeholder="Digite seu nome completo" />
      </section>

      <section>
        <label>Email<span class="color-vermelho">*</span></label>
        <input type="email" placeholder="Digite seu email" />
      </section>

      <section>
        <label>Senha<span class="color-vermelho">*</span></label>
        <input type="password" placeholder="Digite sua senha" />
      </section>

      <section>
        <label>Confirme sua senha<span class="color-vermelho">*</span></label>
        <input type="password" placeholder="Digite sua senha novamente" />
      </section>

      <section>
        <label>CPF<span class="color-vermelho">*</span></label>
        <input type="text" placeholder="Digite seu CPF" />
      </section>

      <div class="opcoes">
        <label class="checkbox-area">
          <input type="checkbox" />
          <p class="span">
            Eu li e concordo com os <a href="indexTermos.html">termos de uso e politica de privacidade.</a></p>
        </label>
      </div>

      <section>
        <a href="indexHome.html"> <button class="btn">Cadastrar</button></a>
      </section>

      <section>
        <p class="cad-btn">Já tem uma conta?<a href="indexLogaluno.html">Faça login</a></p>
      </section>
    </div>
  </div>
</body>
<script src="scriptCadastroAluno.js"></script>
</body>
</html>
