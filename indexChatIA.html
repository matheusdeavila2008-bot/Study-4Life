<!doctype html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChatIA</title>
  <link rel="stylesheet" href="styleChatIA.css" />
</head>

<body>

  <header>
    <section class="header-container">
      <a href="indexHome.html">
        <img src="study4life_glitch_rgb.gif" class="logo" alt="logo study4life" />
      </a>

      <nav class="apagar">
        <a href="indexHome.html">Home</a>
        <a href="indexFoco.html">Foco</a>
        <a href="indexBiblioteca.html">Biblioteca</a>
        <a href="indexQuiz.html">Quiz</a>
        <p class="headerp">StudyChat.IA</p>
        <a href="indexRanking.html">Ranking</a>
      </nav>

      <a href="indexPerfil.html" class="icone-perfil">👨‍💻</a>
      <img src="menu.png" class="menu-icon" onclick="openMenu()" alt="Menu" />

      <!-- Menu lateral -->
      <div id="menuLateral" class="sidebar">
        <span class="closebtn" onclick="closeMenu()">&times;</span>
        <a href="indexHome.html">Home</a>
        <a href="indexFoco.html">Foco</a>
        <a href="indexBiblioteca.html">Biblioteca</a>
        <a href="indexQuiz.html">Quiz</a>
        <p>&gt;StudyChat.IA&lt;</p>
        <a href="indexRanking.html">Ranking</a>
      </div>
    </section>
  </header>


  <button class="toggle-historico" onclick="toggleHistorico()"><span><svg xmlns="http://www.w3.org/2000/svg"
        height="24px" viewBox="0 -960 960 960" width="24px" fill="#7ed957">
        <path d="M120-240v-80h720v80H120Zm0-200v-80h720v80H120Zm0-200v-80h720v80H120Z" />
      </svg></span></button>

  <main class="layout-chat">

    <section class="historico fechado">
      <button class="novo-chat"><svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960"
          width="24px" fill="#FFFFFF">
          <path
            d="M280-280h280v-80H280v80Zm0-160h400v-80H280v80Zm0-160h400v-80H280v80Zm-80 480q-33 0-56.5-23.5T120-200v-560q0-33 23.5-56.5T200-840h560q33 0 56.5 23.5T840-760v560q0 33-23.5 56.5T760-120H200Zm0-80h560v-560H200v560Zm0-560v560-560Z" />
        </svg> Novo Chat</button>
      <h2>Chats Recentes</h2>
      <div class="item-historico">Dúvidas em Português</div>
      <div class="item-historico">Como usar Display Grid</div>
      <div class="item-historico">Corrigir Redação</div>
      <div class="item-historico">Como usar Git e GitHub</div>
      <div class="item-historico">Dicas de Programação</div>
    </section>

    <section class="conteinarChat">
      <div class="chat-central">

        <div class="box-resposta" id="chatBox">
          <div class="mensagem ia">Qual sua dúvida? 👇</div>
        </div>

        <div class="input-area">
          <input id="pergunta" class="caixa-pergunta" type="text" placeholder="Digite sua pergunta..." />
          <button class="botao-enviar" onclick="enviarMensagem()">Enviar</button>
        </div>
      </div>
    </section>
  </main>

  <script src="scriptChatIA.js"></script>
</body>

</html>
