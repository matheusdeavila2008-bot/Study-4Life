<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ChatIA</title>
  <link rel="stylesheet" href="styleChatIA.css" />
</head>
<body>
<header>
  <section class="header-container">
    <a href="indexHome.html">
      <img src="study4life_glitch_rgb.gif" class="logo" alt="Imagem-logo"/>
    </a>

    <nav class="apagar">
      <a href="indexHome.html">Home</a>
      <a href="indexFoco.html">Foco</a>
      <a href="indexBiblioteca.html">Biblioteca</a>
      <a href="indexQuiz.html">Quiz</a>
      <p class="headerp">StudyChat.IA</p>
      <a href="indexRanking.html">Ranking</a>
    </nav>

    <a href="indexPerfil.html" class="icone-perfil">👨‍💻</a>
    <img src="menu.png" class="menu-icon" onclick="openMenu()" alt="Menu"/>

    <div id="menuLateral" class="sidebar">
      <span class="closebtn" onclick="closeMenu()">&times;</span>
      <a href="indexHome.html">Home</a>
      <a href="indexFoco.html">Foco</a>
      <a href="indexBiblioteca.html">Biblioteca</a>
      <a href="indexQuiz.html">Quiz</a>
      <p>&gt;StudyChat.IA&lt;</p>
      <a href="indexRanking.html">Ranking</a>
    </div>
  </section>
</header>

<!-- BOTÃO (fora do histórico) -->
<button class="toggle-historico" onclick="toggleHistorico()"><img src="menu.png" alt=""></button>
<button class="novo-chat">Novo chat</button>

<main class="layout-chat">
  <!-- HISTÓRICO -->
  <section class="historico">
    <h2>Recentes</h2>
    <div class="item-historico">Chat 1</div>
    <div class="item-historico">Chat 2</div>
    <div class="item-historico">Chat 3</div>
    <div class="item-historico">Chat 4</div>
    <div class="item-historico">Chat 5</div>
  </section>

  <!-- CHAT -->
  <section class="conteinarChat">
    <div class="chat-central">

      <div class="box-resposta" id="chatBox">
        <div class="mensagem ia">Qual sua dúvida? 👇</div>
      </div>

      <div class="input-area">
        <input id="pergunta" class="caixa-pergunta" type="text" placeholder="Digite sua pergunta..." />
        <button class="botao-enviar" onclick="enviarMensagem()">Enviar</button>
      </div>
    </div>
  </section>
</main>
<script src="scriptChatIA.js"></script>
</body>
</html>
